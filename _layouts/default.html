<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <style>
      :root {
        --font-display: "Red Hat Display", system-ui, sans-serif;
        --font-text: var(--font-display);
      }
      body {
        margin: 0;
        font-family: var(--font-text);
        color: #151515;
        background: #f5f5f5;
      }
      .wrapper {
        max-width: 1200px;
        margin: 0 auto;
        padding: 16px;
      }
      .site-header {
        background: #fff;
        border-bottom: none;
        margin-bottom: 16px;
      }
      .header-inner {
        padding: 14px 16px 16px;
      }
      .site-brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        color: inherit;
        text-decoration: none;
      }
      .site-brand:hover .site-brand-name {
        color: #ee0000;
      }
      .site-brand:focus-visible {
        outline: 2px solid #06c;
        outline-offset: 4px;
        border-radius: 4px;
      }
      .site-brand-logo {
        height: 34px;
        width: auto;
        display: block;
        flex-shrink: 0;
      }
      .site-brand-name {
        margin: 0;
        font-family: var(--font-display);
        font-size: 1.45rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        color: #151515;
      }
      .site-nav {
        border-top: none;
        background: #000;
      }
      .site-nav-inner {
        padding: 0 8px;
        overflow-x: auto;
        overflow-y: hidden;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 255, 255, 0.35) transparent;
      }
      .site-nav-inner::-webkit-scrollbar {
        height: 6px;
      }
      .site-nav-inner::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.25);
        border-radius: 3px;
      }
      .site-nav-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-wrap: nowrap;
        align-items: stretch;
        gap: 0;
      }
      .site-nav-list li {
        margin: 0;
        flex-shrink: 0;
      }
      .site-nav-link {
        display: block;
        border: none;
        background: transparent;
        font-family: var(--font-text);
        font-size: 0.875rem;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.88);
        padding: 12px 14px;
        cursor: pointer;
        text-decoration: none;
        border-bottom: 3px solid transparent;
        margin-bottom: -1px;
        white-space: nowrap;
      }
      .site-nav-link:hover {
        color: #fff;
        background: rgba(255, 255, 255, 0.12);
      }
      .site-nav-link:focus-visible {
        outline: 2px solid #fff;
        outline-offset: -2px;
      }
      .site-nav-link.active {
        color: #fff;
        font-weight: 600;
        border-bottom-color: #ee0000;
        background: rgba(255, 255, 255, 0.06);
      }
      .notice {
        font-family: var(--font-text);
        background: #fff;
        border: 1px solid #d2d2d2;
        border-left: 4px solid #ee0000;
        border-radius: 6px;
        padding: 12px 14px;
        margin-bottom: 16px;
      }
      .notice ul {
        margin: 8px 0 0 18px;
      }
      .theme-page {
        display: block;
        background: #fff;
        border: 1px solid #d2d2d2;
        border-radius: 6px;
        padding: 16px;
      }
      .theme-page h2 {
        margin-top: 0;
        font-family: var(--font-display);
        font-weight: 700;
      }
      .hub-intro {
        margin: 0 0 8px;
        font-family: var(--font-text);
        font-weight: 600;
      }
      .hub-theme-list {
        margin: 0;
        padding-left: 22px;
        line-height: 1.6;
        font-family: var(--font-text);
      }
      h3 {
        margin-bottom: 8px;
        font-family: var(--font-text);
      }
      .card h3 {
        font-family: var(--font-text);
      }
      ul {
        margin-top: 6px;
      }
      .split {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
        gap: 18px;
      }
      .card {
        border: 1px solid #d2d2d2;
        border-radius: 6px;
        padding: 12px;
        background: #fbfbfb;
      }
      .small {
        font-size: 0.9rem;
        color: #6a6e73;
      }
      a {
        color: #06c;
      }
      /* Theme pages using media-style demo cards (Cloud automation, AIOps, …) */
      .theme-page.theme-cloud .cloud-page-title {
        font-family: var(--font-display);
        text-align: center;
        font-size: 1.75rem;
        font-weight: 700;
        margin: 0 0 20px;
        letter-spacing: -0.02em;
      }
      .theme-cloud-lead {
        font-family: var(--font-text);
        text-align: center;
        max-width: 42rem;
        margin: -8px auto 22px;
        font-size: 0.95rem;
        line-height: 1.45;
        color: #4f5255;
      }
      .demo-card-media-placeholder {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 8rem;
      }
      .demo-card-media-placeholder.instana-accent {
        background: linear-gradient(145deg, #00c8ea 0%, #007a96 100%);
      }
      .demo-card-media-placeholder.servicenow-accent {
        background: linear-gradient(145deg, #ff6644 0%, #c53a1c 100%);
      }
      .demo-card-media-placeholder.splunk-accent {
        background: linear-gradient(145deg, #66ffcc 0%, #1a8870 100%);
      }
      /* Generic tile when no thumbnail image (booth demos) */
      .demo-card-media-placeholder.booth-placeholder {
        background: linear-gradient(145deg, #5c6a7a 0%, #2a3444 100%);
      }
      .demo-card-media-placeholder.booth-placeholder-alt {
        background: linear-gradient(145deg, #6a5c7a 0%, #3a2a44 100%);
      }
      .demo-card-media-placeholder.booth-placeholder-alt2 {
        background: linear-gradient(145deg, #5a7a6a 0%, #2a4438 100%);
      }
      .demo-card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 20px;
        align-items: stretch;
      }
      @media (max-width: 960px) {
        .demo-card-grid {
          grid-template-columns: 1fr;
        }
      }
      a.demo-card {
        display: flex;
        flex-direction: column;
        border: 1px solid #d2d2d2;
        border-radius: 8px;
        background: #fff;
        text-decoration: none;
        color: inherit;
        overflow: hidden;
        transition: box-shadow 0.2s ease, border-color 0.2s ease;
      }
      a.demo-card:hover {
        border-color: #b8bbbe;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
      }
      a.demo-card:focus-visible {
        outline: 2px solid #06c;
        outline-offset: 2px;
      }
      .demo-card-media {
        aspect-ratio: 16 / 9;
        background: #0d0d0d;
        overflow: hidden;
      }
      .demo-card-media img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .demo-card-title {
        margin: 0;
        padding: 14px 16px 8px;
        font-family: var(--font-text);
        font-size: 1rem;
        font-weight: 700;
        line-height: 1.3;
      }
      .demo-card-desc {
        margin: 0;
        padding: 0 16px 16px;
        font-family: var(--font-text);
        font-size: 0.875rem;
        line-height: 1.5;
        color: #4f5255;
        flex: 1;
      }
      .relevant-links {
        margin-top: 28px;
        padding-top: 20px;
        border-top: 1px solid #e0e0e0;
      }
      .relevant-links h3 {
        margin-top: 0;
      }
      .race-cta {
        font-family: var(--font-text);
        margin-top: 20px;
        padding: 14px 16px;
        border: 1px solid #d2d2d2;
        border-radius: 6px;
        background: linear-gradient(180deg, #fafafa 0%, #f0f0f0 100%);
        text-align: center;
      }
      .race-cta-lead {
        margin: 0 0 10px;
        font-size: 0.95rem;
        color: #4f5255;
      }
      .race-cta-link {
        display: inline-block;
        font-weight: 700;
        font-size: 1rem;
        color: #fff;
        background: #ee0000;
        text-decoration: none;
        padding: 10px 18px;
        border-radius: 6px;
        border: 1px solid #c00;
      }
      .race-cta-link:hover {
        background: #cc0000;
        color: #fff;
      }
      .race-cta-link:focus-visible {
        outline: 2px solid #06c;
        outline-offset: 2px;
      }
    </style>
    <link rel="stylesheet" href="{{ '/assets/css/rh-typography.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <div class="wrapper header-inner">
        <a class="site-brand" href="{{ '/' | relative_url }}">
          <img class="site-brand-logo" src="{{ '/assets/images/redhat-logo.svg' | relative_url }}" height="34" alt="" aria-hidden="true" />
          <span class="site-brand-name">{{ site.title }}</span>
        </a>
      </div>
      <nav class="site-nav" aria-label="Booth themes">
        <div class="wrapper site-nav-inner">
          <ul class="site-nav-list">
            <li><a class="site-nav-link{% if page.theme == 'aiops' %} active{% endif %}" href="{{ '/AIOps/' | relative_url }}">AIOps</a></li>
            <li><a class="site-nav-link{% if page.theme == 'workflows' %} active{% endif %}" href="{{ '/Workflows/' | relative_url }}">Workflow orchestration</a></li>
            <li><a class="site-nav-link{% if page.theme == 'developer-experience' %} active{% endif %}" href="{{ '/Developer-Experience/' | relative_url }}">Developer experience</a></li>
            <li><a class="site-nav-link{% if page.theme == 'policy-governance' %} active{% endif %}" href="{{ '/Policy-and-governance/' | relative_url }}">Governance &amp; compliance</a></li>
            <li><a class="site-nav-link{% if page.theme == 'infrastructure-network' %} active{% endif %}" href="{{ '/Infrastructure-and-network/' | relative_url }}">Network &amp; infrastructure</a></li>
            <li><a class="site-nav-link{% if page.theme == 'aap-on-cloud' %} active{% endif %}" href="{{ '/AAP-on-cloud/' | relative_url }}">Cloud automation</a></li>
            <li><a class="site-nav-link{% if page.theme == 'metrics-telemetry' %} active{% endif %}" href="{{ '/Metrics-and-telemetry/' | relative_url }}">Automation ROI</a></li>
            <li><a class="site-nav-link{% if page.theme == 'aap-101' %} active{% endif %}" href="{{ '/AAP-101/' | relative_url }}">Red Hat Ansible 101</a></li>
          </ul>
        </div>
      </nav>
    </header>
    <main class="wrapper">
      {{ content }}
      {% if page.theme and page.theme != 'home' %}
        {% include race-cta.html %}
      {% endif %}
    </main>
  </body>
</html>
