<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title }}</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        color: #151515;
        background: #f5f5f5;
      }
      .wrapper {
        max-width: 1200px;
        margin: 0 auto;
        padding: 16px;
      }
      .site-header {
        background: #fff;
        border-bottom: 1px solid #d2d2d2;
        margin-bottom: 16px;
      }
      .site-header h1 {
        margin: 0;
        padding: 16px;
        font-size: 1.6rem;
      }
      .notice {
        background: #fff;
        border: 1px solid #d2d2d2;
        border-left: 4px solid #ee0000;
        border-radius: 6px;
        padding: 12px 14px;
        margin-bottom: 16px;
      }
      .notice ul {
        margin: 8px 0 0 18px;
      }
      .tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 16px;
      }
      .tab-button {
        background: #fff;
        border: 1px solid #b8bbbe;
        border-radius: 999px;
        padding: 8px 14px;
        cursor: pointer;
        font-size: 0.95rem;
      }
      .tab-button.active {
        background: #ee0000;
        border-color: #ee0000;
        color: #fff;
      }
      .tab-panel {
        display: none;
        background: #fff;
        border: 1px solid #d2d2d2;
        border-radius: 6px;
        padding: 16px;
      }
      .tab-panel.active {
        display: block;
      }
      .tab-panel h2 {
        margin-top: 0;
      }
      .owner {
        color: #6a6e73;
        margin-top: -6px;
      }
      h3 {
        margin-bottom: 8px;
      }
      ul {
        margin-top: 6px;
      }
      .split {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
        gap: 18px;
      }
      .card {
        border: 1px solid #d2d2d2;
        border-radius: 6px;
        padding: 12px;
        background: #fbfbfb;
      }
      .small {
        font-size: 0.9rem;
        color: #6a6e73;
      }
      a {
        color: #06c;
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="wrapper">
        <h1>{{ site.title }}</h1>
      </div>
    </header>
    <main class="wrapper">
      {{ content }}
    </main>
    <script>
      (function () {
        const buttons = Array.from(document.querySelectorAll(".tab-button"));
        const panels = Array.from(document.querySelectorAll(".tab-panel"));

        function activate(tabId) {
          buttons.forEach((button) => {
            button.classList.toggle("active", button.dataset.tab === tabId);
          });
          panels.forEach((panel) => {
            panel.classList.toggle("active", panel.id === tabId);
          });
        }

        buttons.forEach((button) => {
          button.addEventListener("click", function () {
            activate(button.dataset.tab);
          });
        });

        if (buttons.length > 0) {
          activate(buttons[0].dataset.tab);
        }
      })();
    </script>
  </body>
</html>
